name: "Dependency Review"
on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v6
      - name: "Dependency Review"
        uses: actions/dependency-review-action@v4.9.0
        with:
          # uuid@9.x v3/v5/v6 buffer bounds — not reachable; GCP deps only call v4()
          allow-ghsas: |
            GHSA-w5hq-g745-h8pq
