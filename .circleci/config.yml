version: 2.1

executors:
  node:
    docker:
      - image: cimg/node:22.18.0
    working_directory: ~/relayer
    resource_class: medium+
    environment:
      NODE_OPTIONS: --max-old-space-size=5120

jobs:
  install:
    executor: node
    steps:
      - checkout
      - restore_cache:
          name: Restore Yarn Package Cache
          keys:
            - &yarn_cache_key cache-node-v4-{{ checksum "yarn.lock" }}
      - run:
          name: Install Dependencies
          command: yarn install --immutable
      - save_cache:
          name: Save Yarn Package Cache
          key: *yarn_cache_key
          paths:
            - node_modules
      - run:
          name: Extract Solana version
          command: |
            set -euo pipefail

            if [ -z "${SOLANA_VERSION:-}" ]; then
              # Derive from the Cargo.lock of the contracts release matching the installed package version.
              REPO="across-protocol/contracts"
              CONTRACTS_VERSION=$(node -p "require('@across-protocol/contracts/package.json').version")
              REF="v${CONTRACTS_VERSION}"
              curl -fsSL "https://raw.githubusercontent.com/$REPO/$REF/Cargo.lock" -o /tmp/Cargo.lock
              EXTRACTED_VERSION=$(grep -A2 'name = "solana-program"' /tmp/Cargo.lock \
                                 | grep 'version' | head -n1 | cut -d'"' -f2)
              if [ -n "$EXTRACTED_VERSION" ]; then
                VERSION_NUMBER=$(echo "$EXTRACTED_VERSION" | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
                if [ -n "$VERSION_NUMBER" ]; then
                  SOLANA_VERSION="$VERSION_NUMBER"
                fi
              fi
            fi

            echo "Using Solana version: $SOLANA_VERSION"
            echo "$SOLANA_VERSION" > .solana-version
      - run:
          name: Compile contracts
          command: yarn hardhat compile
      - persist_to_workspace:
          root: .
          paths:
            - node_modules
            - artifacts
            - cache
            - .solana-version
  typecheck:
    executor: node
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Typecheck
          command: yarn typecheck
  test:
    executor: node
    parallelism: 20
    steps:
      - checkout
      - attach_workspace:
          at: .
      - restore_cache:
          name: Restore Solana CLI Cache
          keys:
            - &solana_cache_key solana-cli-v2-{{ arch }}-{{ checksum ".solana-version" }}

      # Install Solana CLI
      - run:
          name: Install Solana CLI
          command: |
            # Keep in sync with save_cache.paths below.
            export SOLANA_INSTALL="$HOME/.local/share/solana/install"
            SOLANA_BIN="$SOLANA_INSTALL/active_release/bin"
            export PATH="$SOLANA_BIN:$PATH"
            echo "export PATH=\"$SOLANA_BIN:\$PATH\"" >> $BASH_ENV

            if [ -x "$SOLANA_BIN/solana" ]; then
              echo "Solana CLI already installed (cache hit): $(solana --version)"
              exit 0
            fi

            SOLANA_VERSION=$(cat .solana-version)
            echo "Installing Solana version: $SOLANA_VERSION"

            # Parse version numbers
            MAJOR=$(echo $SOLANA_VERSION | cut -d. -f1)
            MINOR=$(echo $SOLANA_VERSION | cut -d. -f2)
            PATCH=$(echo $SOLANA_VERSION | cut -d. -f3)

            # Determine which URL to use based on version (same logic as GitHub Actions)
            if [ "$MAJOR" -eq 1 ] && [ "$MINOR" -eq 18 ] && [ "$PATCH" -le 23 ]; then
              INSTALL_URL="https://release.solana.com/v${SOLANA_VERSION}/install"
            else
              INSTALL_URL="https://release.anza.xyz/v${SOLANA_VERSION}/install"
            fi

            echo "Installing Solana from: $INSTALL_URL"

            # Use a more robust installation method
            curl -sSfL $INSTALL_URL -o /tmp/solana-install.sh
            chmod +x /tmp/solana-install.sh
            /tmp/solana-install.sh

            solana --version

      - save_cache:
          name: Save Solana CLI Cache
          key: *solana_cache_key
          paths:
            - ~/.local/share/solana/install
      - run:
          name: Run tests
          command: |
            circleci tests glob "test/**/*.ts" | circleci tests split > /tmp/test-files
            yarn test --bail $(cat /tmp/test-files)
  lint:
    executor: node
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Run lint
          command: yarn lint
workflows:
  version: 2.1
  build_and_test:
    jobs:
      - install
      - typecheck:
          requires:
            - install
      - test:
          requires:
            - install
      - lint:
          requires:
            - install
